# Cloudflare Workers + static export from Expo (`npm run export:web` → ./dist).
# `main` + ASSETS binding replaces any dashboard "Hello world" placeholder.
# https://developers.cloudflare.com/workers/static-assets/routing/single-page-application/
#
# Public Supabase client vars are injected into HTML as window.__MM_EXPO_PUBLIC__ (see worker/index.js).
# Override in Dashboard → Workers → mm-app → Settings → Variables if you do not want them in this file.

name = "mm-app"
main = "worker/index.js"
compatibility_date = "2026-04-01"
account_id = "def9bde2fbe069f2a83015206aaf0758"

# Workers Logs + invocation logs (dashboard: Worker → Observability).
# https://developers.cloudflare.com/workers/observability/logs/workers-logs/
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[vars]
EXPO_PUBLIC_SUPABASE_URL = "https://yzunwqzeqfeemyxpkvto.supabase.co"
EXPO_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_jlLEV02J_-3L-C0VcKVzLA_Lzen8jEJ"
# 32-byte hex (64 chars). Same value required on every device for shared map markers, bulletin, missions, vault team folders.
EXPO_PUBLIC_MM_MAP_SHARED_KEY = "ee1eafbc2a5e553b83e10c2e7ff358b7f69bd2349bb04a7b0d2d1fab024e8702"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
