# Cloudflare Workers + static export from Expo (`npm run export:web` → ./dist).
# Without [assets], only the Worker script runs — e.g. a default "Hello world".
# https://developers.cloudflare.com/workers/static-assets/routing/single-page-application/

name = "mm-app"
compatibility_date = "2026-04-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
