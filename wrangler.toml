# Cloudflare Workers + static export from Expo (`npm run export:web` → ./dist).
# `main` + ASSETS binding replaces any dashboard "Hello world" placeholder.
# https://developers.cloudflare.com/workers/static-assets/routing/single-page-application/
#
# Public client vars (EXPO_PUBLIC_*) must NOT live in git — set them in:
#   Cloudflare Dashboard → Workers → mm-app → Settings → Variables
# For local `wrangler dev`, copy `.dev.vars.example` → `.dev.vars` (gitignored).
# They are injected into HTML as window.__MM_EXPO_PUBLIC__ (see worker/index.js).

name = "mm-app"
main = "worker/index.js"
compatibility_date = "2026-04-01"

# Workers Logs + invocation logs (dashboard: Worker → Observability).
# https://developers.cloudflare.com/workers/observability/logs/workers-logs/
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
